server {
    listen 80;
    server_name tiptap.junbyeol.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tiptap.junbyeol.me;
    charset utf-8;

    include /etc/nginx/conf.d/snippets/ssl-tiptap.conf;

    location / {
        proxy_pass http://tiptap-app:80;
        include /etc/nginx/conf.d/snippets/proxy-headers.conf;
    }
}
