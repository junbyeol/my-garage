# WebSocket 핸드셰이크 여부에 따라 Connection 헤더 값을 결정
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name plaza-api.junbyeol.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name plaza-api.junbyeol.me;
    charset utf-8;

    include /etc/nginx/conf.d/snippets/ssl-plaza.conf;

    location / {
        proxy_pass http://plaza-backend:3000;
        include /etc/nginx/conf.d/snippets/proxy-headers.conf;

        # WebSocket / Socket.io 지원
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 연결이 오래 유지되도록 타임아웃 연장
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
