# 외부 서비스 단축 도메인 관리
# 새 도메인 추가 시: map 블록에 한 줄만 추가하면 됩니다.
map $host $shortlink_url {
    github.junbyeol.me   https://github.com/junbyeol;
    linkedin.junbyeol.me https://linkedin.com/in/junsungyoon/;
}

server {
    listen 80;
    server_name github.junbyeol.me linkedin.junbyeol.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name github.junbyeol.me linkedin.junbyeol.me;

    include /etc/nginx/conf.d/snippets/ssl-junbyeol.conf;

    return 301 $shortlink_url;
}


# 정의되지 않은 모든 요청 차단 (Security)
server {
    listen 80 default_server;
    server_name _;
    charset utf-8;

    return 404 "잘못된 접근입니다.";
}
