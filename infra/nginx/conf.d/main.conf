server {
    listen 80;
    server_name junbyeol.me www.junbyeol.me;
    return 301 https://junbyeol.me$request_uri;
}

server {
    listen 443 ssl;
    server_name www.junbyeol.me;

    include /etc/nginx/conf.d/snippets/ssl-junbyeol.conf;

    return 301 https://junbyeol.me$request_uri;
}


server {
    listen 443 ssl;
    server_name junbyeol.me;
    charset utf-8;

    include /etc/nginx/conf.d/snippets/ssl-junbyeol.conf;

    location / {
        proxy_pass http://junbyeol-me:80;
        include /etc/nginx/conf.d/snippets/proxy-headers.conf;
    }
}
